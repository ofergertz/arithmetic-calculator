<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arithmetic Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 480px;
      padding: 2.5rem;
      color: #fff;
    }

    .card-title {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.25rem;
      background: linear-gradient(90deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    label {
      color: rgba(255,255,255,0.75);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .form-control {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-size: 1.1rem;
      padding: 0.65rem 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      background: rgba(255,255,255,0.12);
      border-color: #e94560;
      box-shadow: 0 0 0 3px rgba(233,69,96,0.25);
      color: #fff;
      outline: none;
    }

    .form-control::placeholder { color: rgba(255,255,255,0.3); }

    .btn-calc {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #e94560, #c62a47);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(233,69,96,0.4);
      margin-top: 1.5rem;
    }

    .btn-calc:hover  { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(233,69,96,0.55); }
    .btn-calc:active { transform: translateY(0); }
    .btn-calc:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Results */
    #results {
      margin-top: 2rem;
      display: none;
    }

    .results-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 1rem;
      text-align: center;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      margin-bottom: 0.5rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.2s;
    }

    .result-row:hover { background: rgba(255,255,255,0.1); }

    .op-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
    }

    .op-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .icon-add      { background: rgba(52,211,153,0.2);  color: #34d399; }
    .icon-sub      { background: rgba(251,191,36,0.2);  color: #fbbf24; }
    .icon-mul      { background: rgba(139,92,246,0.2);  color: #8b5cf6; }
    .icon-div      { background: rgba(59,130,246,0.2);  color: #3b82f6; }
    .icon-mod      { background: rgba(249,115,22,0.2);  color: #f97316; }
    .icon-pow      { background: rgba(236,72,153,0.2);  color: #ec4899; }

    .op-value {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }

    .undefined-val {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      font-style: italic;
    }

    .error-box {
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.4);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #e94560;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 1rem;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-title">🧮 Arithmetic Calculator</div>
    <div class="subtitle">Add · Subtract · Multiply · Divide · Modulo · Power</div>

    <div class="mb-3">
      <label for="numA">Number A</label>
      <input id="numA" type="number" class="form-control" placeholder="e.g. 10" step="any" />
    </div>

    <div class="mb-3">
      <label for="numB">Number B</label>
      <input id="numB" type="number" class="form-control" placeholder="e.g. 3" step="any" />
    </div>

    <button class="btn-calc" id="calcBtn" onclick="calculate()">Calculate</button>

    <div id="error" style="display:none"></div>

    <div id="results">
      <div class="results-title">Results</div>
      <div class="result-row">
        <span class="op-label"><span class="op-icon icon-add">+</span>Addition</span>
        <span class="op-value" id="r-add"></span>
      </div>
      <div class="result-row">
        <span class="op-label"><span class="op-icon icon-sub">−</span>Subtraction</span>
        <span class="op-value" id="r-sub"></span>
      </div>
      <div class="result-row">
        <span class="op-label"><span class="op-icon icon-mul">×</span>Multiplication</span>
        <span class="op-value" id="r-mul"></span>
      </div>
      <div class="result-row">
        <span class="op-label"><span class="op-icon icon-div">÷</span>Division</span>
        <span class="op-value" id="r-div"></span>
      </div>
      <div class="result-row">
        <span class="op-label"><span class="op-icon icon-mod">%</span>Modulo</span>
        <span class="op-value" id="r-mod"></span>
      </div>
      <div class="result-row">
        <span class="op-label"><span class="op-icon icon-pow">^</span>Power</span>
        <span class="op-value" id="r-pow"></span>
      </div>
    </div>
  </div>

  <script>
    // Allow Enter key to trigger calculate
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });

    function fmt(val) {
      if (val === null || val === undefined)
        return '<span class="undefined-val">undefined (÷ 0)</span>';
      // Format nicely: up to 10 significant digits, strip trailing zeros
      return parseFloat(val.toPrecision(10)).toString();
    }

    async function calculate() {
      const btn = document.getElementById('calcBtn');
      const errBox = document.getElementById('error');
      const results = document.getElementById('results');

      const a = document.getElementById('numA').value.trim();
      const b = document.getElementById('numB').value.trim();

      errBox.style.display = 'none';
      results.style.display = 'none';

      if (a === '' || b === '') {
        errBox.innerHTML = '<div class="error-box">⚠️ Please enter both numbers.</div>';
        errBox.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Calculating…';

      try {
        const res = await fetch('/api/calculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ a, b })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Server error');
        }

        const d = await res.json();

        document.getElementById('r-add').innerHTML = fmt(d.add);
        document.getElementById('r-sub').innerHTML = fmt(d.subtract);
        document.getElementById('r-mul').innerHTML = fmt(d.multiply);
        document.getElementById('r-div').innerHTML = fmt(d.divide);
        document.getElementById('r-mod').innerHTML = fmt(d.modulo);
        document.getElementById('r-pow').innerHTML = fmt(d.power);

        results.style.display = 'block';
      } catch (e) {
        errBox.innerHTML = `<div class="error-box">❌ ${e.message}</div>`;
        errBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Calculate';
      }
    }
  </script>
</body>
</html>
