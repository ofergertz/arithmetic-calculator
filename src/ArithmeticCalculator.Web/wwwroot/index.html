<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arithmetic Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f5e9 50%, #fff8e1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem 1rem;
    }

    .page-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      width: 100%;
      max-width: 1000px;
    }

    .side-img {
      flex: 0 0 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .side-img img {
      width: 150px;
      height: 150px;
      object-fit: contain;
      border-radius: 16px;
      background: white;
      padding: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .card {
      background: #ffffff;
      border: none;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 460px;
      padding: 2.5rem;
      color: #1a1a2e;
      flex: 0 0 auto;
    }

    .card-title {
      font-size: 1.8rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.25rem;
      background: linear-gradient(90deg, #5b4fcf, #2196f3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #8a94a6;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    label {
      color: #4a5568;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .form-control {
      background: #f7f9fc;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      color: #1a202c;
      font-size: 1.1rem;
      padding: 0.65rem 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      background: #fff;
      border-color: #5b4fcf;
      box-shadow: 0 0 0 3px rgba(91,79,207,0.15);
      color: #1a202c;
      outline: none;
    }

    .form-control::placeholder { color: #b0bac9; }

    .btn-calc {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #5b4fcf, #2196f3);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(91,79,207,0.30);
      margin-top: 1.5rem;
    }

    .btn-calc:hover  { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(91,79,207,0.40); }
    .btn-calc:active { transform: translateY(0); }
    .btn-calc:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    #results {
      margin-top: 2rem;
      display: none;
    }

    .results-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #a0aec0;
      margin-bottom: 1rem;
      text-align: center;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 1rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      background: #f7f9fc;
      border: 1.5px solid #e8edf5;
      transition: background 0.2s;
    }

    .result-row:hover { background: #eef2fb; }

    .op-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: #4a5568;
    }

    .op-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .icon-add { background: #d1fae5; color: #059669; }
    .icon-sub { background: #fef3c7; color: #d97706; }
    .icon-mul { background: #ede9fe; color: #7c3aed; }
    .icon-div { background: #dbeafe; color: #2563eb; }
    .icon-mod { background: #ffedd5; color: #ea580c; }
    .icon-pow { background: #fce7f3; color: #db2777; }

    .op-value {
      font-size: 1rem;
      font-weight: 700;
      color: #1a202c;
    }

    .undefined-val {
      font-size: 0.8rem;
      color: #a0aec0;
      font-style: italic;
    }

    .error-box {
      background: #fff5f5;
      border: 1.5px solid #fed7d7;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: #c53030;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 1rem;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .side-img { display: none; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <!-- Left math image -->
    <div class="side-img">
      <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" alt="Math formulas" />
      <img src="https://cdn-icons-png.flaticon.com/512/1187/1187518.png" alt="Calculator" />
    </div>

    <!-- Main card -->
    <div class="card">
      <div class="card-title">🧮 Arithmetic Calculator</div>
      <div class="subtitle">Add · Subtract · Multiply · Divide · Modulo · Power</div>

      <div class="mb-3">
        <label for="numA">Number A</label>
        <input id="numA" type="number" class="form-control" placeholder="e.g. 10" step="any" />
      </div>

      <div class="mb-3">
        <label for="numB">Number B</label>
        <input id="numB" type="number" class="form-control" placeholder="e.g. 3" step="any" />
      </div>

      <button class="btn-calc" id="calcBtn" onclick="calculate()">Calculate</button>

      <div id="error" style="display:none"></div>

      <div id="results">
        <div class="results-title">Results</div>
        <div class="result-row">
          <span class="op-label"><span class="op-icon icon-add">+</span>Addition</span>
          <span class="op-value" id="r-add"></span>
        </div>
        <div class="result-row">
          <span class="op-label"><span class="op-icon icon-sub">−</span>Subtraction</span>
          <span class="op-value" id="r-sub"></span>
        </div>
        <div class="result-row">
          <span class="op-label"><span class="op-icon icon-mul">×</span>Multiplication</span>
          <span class="op-value" id="r-mul"></span>
        </div>
        <div class="result-row">
          <span class="op-label"><span class="op-icon icon-div">÷</span>Division</span>
          <span class="op-value" id="r-div"></span>
        </div>
        <div class="result-row">
          <span class="op-label"><span class="op-icon icon-mod">%</span>Modulo</span>
          <span class="op-value" id="r-mod"></span>
        </div>
        <div class="result-row">
          <span class="op-label"><span class="op-icon icon-pow">^</span>Power</span>
          <span class="op-value" id="r-pow"></span>
        </div>
      </div>
    </div>

    <!-- Right math image -->
    <div class="side-img">
      <img src="https://cdn-icons-png.flaticon.com/512/3281/3281289.png" alt="Math symbols" />
      <img src="https://cdn-icons-png.flaticon.com/512/2436/2436874.png" alt="Numbers" />
    </div>

  </div>

  <script>
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });

    function fmt(val) {
      if (val === null || val === undefined)
        return '<span class="undefined-val">undefined (÷ 0)</span>';
      return parseFloat(val.toPrecision(10)).toString();
    }

    async function calculate() {
      const btn = document.getElementById('calcBtn');
      const errBox = document.getElementById('error');
      const results = document.getElementById('results');

      const a = document.getElementById('numA').value.trim();
      const b = document.getElementById('numB').value.trim();

      errBox.style.display = 'none';
      results.style.display = 'none';

      if (a === '' || b === '') {
        errBox.innerHTML = '<div class="error-box">⚠️ Please enter both numbers.</div>';
        errBox.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Calculating…';

      try {
        const res = await fetch('/api/calculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ a, b })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Server error');
        }

        const d = await res.json();
        document.getElementById('r-add').innerHTML = fmt(d.add);
        document.getElementById('r-sub').innerHTML = fmt(d.subtract);
        document.getElementById('r-mul').innerHTML = fmt(d.multiply);
        document.getElementById('r-div').innerHTML = fmt(d.divide);
        document.getElementById('r-mod').innerHTML = fmt(d.modulo);
        document.getElementById('r-pow').innerHTML = fmt(d.power);
        results.style.display = 'block';
      } catch (e) {
        errBox.innerHTML = `<div class="error-box">❌ ${e.message}</div>`;
        errBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Calculate';
      }
    }
  </script>
</body>
</html>
